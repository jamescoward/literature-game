name: Build Puzzle Data

on:
  # Regenerate puzzles on the 1st of every month at 00:00 UTC
  schedule:
    - cron: '0 0 1 * *'
  # Allow manual trigger from the GitHub UI (useful for testing or forced refresh)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max number of books to process (leave blank for full corpus)'
        required: false
        default: ''

# Only one run at a time; cancel any in-progress run when a new one starts
concurrency:
  group: build-puzzles
  cancel-in-progress: true

permissions:
  contents: write  # Required to commit and push the updated puzzles.json

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the bot can push the commit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build puzzle data
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            npm run build:puzzles -- --limit ${{ github.event.inputs.limit }}
          else
            npm run build:puzzles
          fi

      - name: Check whether puzzles.json was updated
        id: changes
        run: |
          if git diff --quiet public/data/puzzles.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated puzzle data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/puzzles.json
          git commit -m "chore: regenerate puzzle data [skip ci]"
          git push
